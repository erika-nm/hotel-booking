<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kelola Kamar</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@300;400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Jost',sans-serif;
}

body{
background:#0b0b0d;
color:white;
padding:35px;
min-height:100vh;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
font-family:'Cormorant Garamond',serif;
font-size:48px;
color:#d4af37;
margin-bottom:15px;
}

a{
display:inline-block;
margin-bottom:25px;
color:#d4af37;
text-decoration:none;
font-weight:600;
}

hr{
border:none;
height:1px;
background:rgba(212,175,55,.15);
margin-bottom:25px;
}

input,
textarea{
width:100%;
padding:15px;
margin-bottom:15px;
background:#1b1b1b;
border:1px solid rgba(212,175,55,.15);
border-radius:12px;
color:white;
outline:none;
font-size:15px;
}

input:focus,
textarea:focus{
border-color:#d4af37;
}

textarea{
min-height:120px;
resize:vertical;
}

button{
padding:14px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

button:hover{
transform:translateY(-3px);
}

.add-btn{
background:#d4af37;
color:black;
}

.edit-btn{
background:#ffc107;
color:black;
border:none;
margin-right:5px;
}

.delete-btn{
background:#dc3545;
color:white;
border:none;
}

table{
width:100%;
border-collapse:collapse;
margin-top:25px;
background:#141414;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

th{
background:#d4af37;
color:black;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid rgba(255,255,255,.08);
}

tr:hover{
background:#1d1d1d;
}

::-webkit-scrollbar{
width:10px;
height:10px;
}

::-webkit-scrollbar-track{
background:#111;
}

::-webkit-scrollbar-thumb{
background:#d4af37;
border-radius:20px;
}

@media(max-width:768px){

body{
padding:20px;
}

h1{
font-size:36px;
}

table{
display:block;
overflow-x:auto;
}

}

</style>

</head>
<body>

<div class="container">

<h1>Kelola Kamar</h1>

<a href="admin.html">
← Kembali ke Dashboard
</a>

<hr>

<input
type="file"
id="roomImage"
accept="image/*">

<input
type="text"
id="room_name"
placeholder="Nama Kamar">

<textarea
id="description"
placeholder="Deskripsi Kamar">
</textarea>

<input
type="number"
id="price"
placeholder="Harga">


<button
class="add-btn"
onclick="addRoom()">
Tambah Kamar
</button>

<table>

<thead>
<tr>
<th>ID</th>
<th>Nama</th>
<th>Harga</th>
<th>Aksi</th>
</tr>
</thead>

<tbody id="roomTable">

</tbody>

</table>

</div>

<script src="js/manageRooms.js"></script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const cursor = document.createElement("div");

    cursor.style.width = "14px";
    cursor.style.height = "14px";
    cursor.style.background = "#d4af37";
    cursor.style.borderRadius = "50%";
    cursor.style.position = "fixed";
    cursor.style.left = "0";
    cursor.style.top = "0";
    cursor.style.pointerEvents = "none";
    cursor.style.zIndex = "999999";
    cursor.style.transform = "translate(-50%, -50%)";
    cursor.style.boxShadow = "0 0 20px rgba(212,175,55,0.8)";

    document.body.appendChild(cursor);

    document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });
});
</script>
</body>
</html>
