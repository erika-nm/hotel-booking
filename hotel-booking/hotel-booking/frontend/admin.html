<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin Hotel</title>

<style>

@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Jost:wght@300;400;500;600&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Jost',sans-serif;
}

body{
background:#0b0b0d;
color:white;
padding:35px;
min-height:100vh;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:35px;
padding-bottom:20px;
border-bottom:1px solid rgba(212,175,55,.15);
}

.header h1{
font-family:'Cormorant Garamond',serif;
font-size:46px;
color:#d4af37;
letter-spacing:1px;
}

.header-buttons{
display:flex;
gap:12px;
}

/* BUTTON */

.btn{
padding:12px 18px;
border:none;
border-radius:12px;
cursor:pointer;
font-weight:600;
transition:.3s;
}

.btn:hover{
transform:translateY(-3px);
}

.room-btn{
background:#d4af37;
color:black;
}

.logout-btn{
background:#dc3545;
color:white;
}

/* CARD STATS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:linear-gradient(145deg,#171717,#111);
padding:25px;
border-radius:20px;
border:1px solid rgba(212,175,55,.15);
box-shadow:0 10px 30px rgba(0,0,0,.4);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:#d4af37;
}

.card h2{
font-size:48px;
color:#d4af37;
margin-bottom:10px;
}

.card p{
color:#bbb;
font-size:15px;
}

/* TABLE */

.table-container{
background:#141414;
padding:25px;
border-radius:20px;
border:1px solid rgba(212,175,55,.15);
box-shadow:0 10px 30px rgba(0,0,0,.4);
overflow-x:auto;
}

table{
width:100%;
border-collapse:collapse;
min-width:1300px;
}

th{
background:#d4af37;
color:black;
padding:15px;
font-weight:600;
}

td{
padding:14px;
border-bottom:1px solid rgba(255,255,255,.08);
color:white;
}

tr{
transition:.3s;
}

tr:hover{
background:#1b1b1b;
}

/* STATUS */

select{
background:#222;
color:white;
padding:8px;
border-radius:8px;
border:1px solid rgba(212,175,55,.2);
outline:none;
}

/* ACTION BUTTON */

.edit-btn{
background:#ffc107;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
margin-right:5px;
}

.delete-btn{
background:#dc3545;
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
margin-right:5px;
}

.invoice-btn{
background:#d4af37;
color:black;
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-weight:600;
}

.edit-btn:hover,
.delete-btn:hover,
.invoice-btn:hover{
opacity:.85;
}

/* SCROLLBAR */

::-webkit-scrollbar{
width:10px;
height:10px;
}

::-webkit-scrollbar-track{
background:#111;
}

::-webkit-scrollbar-thumb{
background:#d4af37;
border-radius:20px;
}

/* RESPONSIVE */

@media(max-width:768px){

body{
padding:20px;
}

.header{
flex-direction:column;
align-items:flex-start;
gap:20px;
}

.header h1{
font-size:34px;
}

}

</style>
</head>
<body>

<script>

const admin =
JSON.parse(localStorage.getItem("admin"));

if(!admin){
    window.location.href = "login.html";
}

</script>

<div class="header">

    <h1>Dashboard Booking Hotel</h1>

    <div class="header-buttons">

        <a href="manage-rooms.html">
            <button class="btn room-btn">
                Kelola Kamar
            </button>
        </a>

        <button
        class="btn logout-btn"
        onclick="logout()">
            Logout
        </button>

    </div>

</div>

<div class="cards">

    <div class="card">
        <h2 id="totalBooking">0</h2>
        <p>Total Booking</p>
    </div>

</div>

<div class="table-container">

<table>

<thead>

<tr>
<th>ID</th>
<th>Nama</th>
<th>Email</th>
<th>Phone</th>
<th>Kamar</th>
<th>Status</th>
<th>Check In</th>
<th>Check Out</th>
<th>Total Harga</th>
<th>Aksi</th>
</tr>

</thead>

<tbody id="bookingTable">

</tbody>

</table>

</div>

<script>

function logout(){

    localStorage.removeItem("admin");

    window.location.href =
    "login.html";

}

const table =
document.getElementById("bookingTable");

const totalBooking =
document.getElementById("totalBooking");

async function loadBookings(){

    try{

        const response =
        await fetch(
        "https://hotel-booking-production-bccd.up.railway.app/api/bookings"
        );

        const data =
        await response.json();

        totalBooking.textContent =
        data.length;

        table.innerHTML = "";

        data.forEach(item => {

            table.innerHTML += `
            <tr>

                <td>${item.id}</td>

                <td>${item.customer_name}</td>

                <td>${item.email}</td>

                <td>${item.phone}</td>

                <td>${item.room_name}</td>

<td>

<select
onchange="changeStatus(${item.id}, this.value)">

<option
value="Pending"
${item.status === "Pending" ? "selected" : ""}>
Pending
</option>

<option
value="Check In"
${item.status === "Check In" ? "selected" : ""}>
Check In
</option>

<option
value="Check Out"
${item.status === "Check Out" ? "selected" : ""}>
Check Out
</option>

<option
value="Selesai"
${item.status === "Selesai" ? "selected" : ""}>
Selesai
</option>

<option
value="Dibatalkan"
${item.status === "Dibatalkan" ? "selected" : ""}>
Dibatalkan
</option>

</select>

</td>

<td>${item.check_in}</td>

                <td>${item.check_out}</td>

                <td>
                    Rp ${Number(item.total_price).toLocaleString("id-ID")}
                </td>

                <td>

                    <button
class="edit-btn"
onclick="editBooking(${item.id})">
Edit
</button>

<button
class="delete-btn"
onclick="deleteBooking(${item.id})">
Hapus
</button>

<button
class="invoice-btn"
onclick="downloadInvoice(${item.id})">
Invoice
</button>

                </td>

            </tr>
            `;

        });

    }catch(error){

        console.error(error);

        alert("Gagal mengambil data booking");

    }

}

async function editBooking(id){

    const nama =
    prompt("Nama Baru");

    if(nama === null) return;

    const email =
    prompt("Email Baru");

    if(email === null) return;

    const phone =
    prompt("Phone Baru");

    if(phone === null) return;

    try{

        await fetch(
        `https://hotel-booking-production-bccd.up.railway.app/api/bookings/${id}`,
        {
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                customer_name:nama,
                email,
                phone
            })
        });

        alert("Booking berhasil diupdate");

        loadBookings();

    }catch(error){

        console.error(error);

        alert("Gagal update booking");

    }

}

async function deleteBooking(id){

    const yakin =
    confirm(
    "Yakin ingin menghapus booking ini?"
    );

    if(!yakin){
        return;
    }

    try{

        await fetch(
        `https://hotel-booking-production-bccd.up.railway.app/api/bookings/${id}`,
        {
            method:"DELETE"
        });

        alert(
        "Booking berhasil dihapus"
        );

        loadBookings();

    }catch(error){

        console.error(error);

        alert(
        "Gagal menghapus booking"
        );

    }

}

async function changeStatus(id,status){

    await fetch(
        `https://hotel-booking-production-bccd.up.railway.app/api/bookings/${id}/status`,
        {
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                status
            })
        }
    );

}

function downloadInvoice(id){

    window.open(
        `https://hotel-booking-production-bccd.up.railway.app/api/invoice/${id}`,
        "_blank"
    );

}

loadBookings();

</script>

<script>
document.addEventListener("DOMContentLoaded", () => {
    const cursor = document.createElement("div");

    cursor.style.width = "14px";
    cursor.style.height = "14px";
    cursor.style.background = "#d4af37";
    cursor.style.borderRadius = "50%";
    cursor.style.position = "fixed";
    cursor.style.left = "0";
    cursor.style.top = "0";
    cursor.style.pointerEvents = "none";
    cursor.style.zIndex = "999999";
    cursor.style.transform = "translate(-50%, -50%)";
    cursor.style.boxShadow = "0 0 20px rgba(212,175,55,0.8)";

    document.body.appendChild(cursor);

    document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });
});
</script>
</body>
</html>
